<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Keezenix Backend</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; }
        input, textarea, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        #responseArea { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h2>Test Backend Upload</h2>
    <form id="uploadForm">
        <input type="text" name="name" placeholder="Name" value="John Doe" required>
        <input type="email" name="email" placeholder="Email" value="johndoe@test.com" required>
        <input type="text" name="phone" placeholder="Phone Number" value="+1234567890" required>
        <textarea name="message" placeholder="Optional message" rows="4">Here is my test application!</textarea>
        
        <label>Select a document or image (PDF, DOCX, JPG, PNG):</label>
        <input type="file" name="resume" required>
        
        <button type="submit">Submit Application</button>
    </form>
    
    <div id="responseArea"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevents the browser from instantly reloading
            
            const form = e.target;
            const formData = new FormData(form);
            const responseArea = document.getElementById('responseArea');
            const submitBtn = form.querySelector('button');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";
            responseArea.style.display = 'none';

            try {
                const response = await fetch('http://localhost:5000/apply', {
                    method: 'POST',
                    body: formData
                });

                const resultText = await response.text();

                responseArea.style.display = 'block';
                responseArea.innerText = `Status: ${response.status}\n\n${resultText}`;
                
                if (response.ok) {
                    responseArea.className = 'success';
                } else {
                    responseArea.className = 'error';
                }

            } catch (err) {
                responseArea.style.display = 'block';
                responseArea.className = 'error';
                responseArea.innerText = "Network Error! Make sure your backend server is running.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Application";
            }
        });
    </script>
</body>
</html>
